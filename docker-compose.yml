version: "3.9"

services:
  mongo:
    image: mongo:6.0
    container_name: taskflow_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskflow_db

  backend:
    build: ./backend
    container_name: taskflow_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=change-me-in-production
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=taskflow_db
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

  frontend:
    image: node:18-alpine
    container_name: taskflow_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_BASE=http://localhost:8000/api/v1

volumes:
  mongo_data:
